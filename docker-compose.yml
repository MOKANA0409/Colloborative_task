services:

  mysql:
    image: mariadb:10.6
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: taskdb
    ports:
      - "3307:3306"
    networks:
      - fsd-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql
    restart: always
    networks:
      - fsd-network

  task-service:
    build: ./task-service
    container_name: task-service
    ports:
      - "8082:8082"
    depends_on:
      - mysql
    restart: always
    networks:
      - fsd-network

networks:
  fsd-network: